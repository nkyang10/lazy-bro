<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 400px;
      height: 600px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    /* ---- Header bar ---- */
    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .popup-header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    /* Active/Inactive toggle pill */
    .toggle-btn {
      padding: 4px 10px;
      border-radius: 12px;
      border: none;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }
    .toggle-btn.inactive { background: #f0f0f0; color: #666; }
    .toggle-btn.active { background: #10a37f; color: white; }
    .settings-btn, .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    .settings-btn:hover, .clear-btn:hover { background: #f0f0f0; }

    /* ---- Settings panel (toggled by settings btn) ---- */
    .settings-panel-container {
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: none;
    }
    .settings-panel-container.show { display: block; }
    .settings-panel h3 { font-size: 14px; margin: 0 0 10px 0; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 11px; font-weight: 500; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #10a37f; }
    /* URL + Connect button row */
    .url-row { display: flex; gap: 6px; }
    .url-row input { flex: 1; }
    .fetch-btn {
      padding: 6px 12px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .fetch-btn:hover { background: #0d8a6a; }
    .fetch-btn:disabled { background: #ccc; cursor: not-allowed; }
    /* Model section (hidden by default) */
    .model-section { margin-bottom: 10px; }
    .custom-model-row { margin-top: 6px; }
    .custom-model-row input {
      width: 100%;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px dashed #d0d0d0;
      border-radius: 6px;
      font-family: inherit;
    }
    .custom-model-row input:focus { outline: none; border-color: #10a37f; border-style: solid; }
    /* Model fetch status messages */
    .model-status { font-size: 11px; padding: 6px 8px; margin-bottom: 8px; border-radius: 4px; }
    .model-status-loading { background: #f0f7ff; color: #1a73e8; }
    .model-status-error { background: #fff0f0; color: #c33; }
    /* Required/optional label badges */
    .required { color: #e53e3e; font-weight: 700; }
    .optional { color: #999; font-weight: 400; font-size: 10px; }
    .save-btn {
      width: 100%;
      padding: 8px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .save-btn:hover { background: #0d8a6a; }
    .settings-actions { display: flex; gap: 8px; }
    .action-btn {
      flex: 1;
      padding: 6px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .action-btn:hover { background: #e0e0e0; }
    .settings-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; }
    .settings-section h4 { font-size: 12px; margin: 0 0 8px 0; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
    .checkbox-group input[type="checkbox"] { width: auto; margin: 0; }
    .help-text { font-size: 10px; color: #999; margin: 2px 0 0 22px; }

    /* ---- Chat messages area ---- */
    .chat-container {
      flex-grow: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* Individual message bubble */
    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
    }
    .message-content { margin-bottom: 2px; }
    .message-content pre {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 11px;
      margin: 6px 0;
    }
    .message-content code {
      background: #e8e8e8;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .message-content pre code { background: transparent; padding: 0; }
    .message-content a { color: #10a37f; text-decoration: none; }
    .message-content a:hover { text-decoration: underline; }
    .user-message { align-self: flex-end; background: #10a37f; color: white; border-bottom-right-radius: 4px; }
    .assistant-message { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    .message-timestamp { font-size: 9px; color: #999; margin-top: 2px; }
    /* Copy button — shown on message hover */
    .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0, 0, 0, 0.1);
      border: none;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .message:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: rgba(0, 0, 0, 0.2); }
    .copy-btn.copied { background: #10a37f; color: white; }
    /* Typing indicator (animated dots) */
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 12px; }
    .typing-indicator .dot {
      width: 6px;
      height: 6px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    /* Error message styling */
    .error-message { background: #fee; border: 1px solid #fcc; color: #c33; }
    .error-content { margin-bottom: 6px; font-size: 12px; }
    .retry-btn {
      background: #10a37f; color: white; border: none; border-radius: 4px;
      padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    .retry-btn:hover { background: #0d8a6a; }

    /* ---- Bottom input bar ---- */
    .input-area {
      padding: 10px 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex-grow: 1;
      resize: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      min-height: 36px;
      max-height: 80px;
      overflow-y: auto;
    }
    .input-area textarea:focus { outline: none; border-color: #10a37f; }
    .send-btn {
      padding: 8px 16px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      align-self: flex-end;
    }
    .send-btn:hover { background: #0d8a6a; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ==================== Header ==================== -->
  <div class="popup-header">
    <h1>Lazy Browser</h1>
    <div class="header-controls">
      <!-- Settings gear icon button -->
      <button id="settingsBtn" class="settings-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <!-- Clear chat (trash icon) button -->
      <button id="clearChatBtn" class="clear-btn" title="Clear Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
      <!-- Active / Inactive toggle pill -->
      <button id="toggleBtn" class="toggle-btn inactive">Inactive</button>
    </div>
  </div>

  <!-- ==================== Settings panel (hidden by default) ==================== -->
  <!-- Populated dynamically by settings-panel.js -->
  <div id="settingsPanel" class="settings-panel-container"></div>

  <!-- ==================== Chat message list ==================== -->
  <!-- Messages are rendered here dynamically by popup.js -->
  <div id="chatContainer" class="chat-container"></div>

  <!-- ==================== Input area ==================== -->
  <div class="input-area">
    <!-- Enter to send, Shift+Enter for newline -->
    <textarea id="userInput" placeholder="Type your message... (Enter to send, Shift+Enter for new line)"></textarea>
    <button id="sendBtn" class="send-btn">Send</button>
  </div>

  <!-- Scripts: loaded in dependency order -->
  <script src="config.js"></script>
  <script src="system-prompt.js"></script>
  <script src="history.js"></script>
  <script src="settings-panel.js"></script>
  <script src="popup.js"></script>
</body>
</html>
